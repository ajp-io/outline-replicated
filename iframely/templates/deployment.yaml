apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "iframely.fullname" . }}
  labels:
    {{- include "iframely.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "iframely.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "iframely.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: iframely
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
